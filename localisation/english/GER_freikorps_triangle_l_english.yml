 GER_freikorps_triangle_status_desc:0 "§MStrasser / Radicalism§!: [?GER_freikorps_radicalism|0]\n§YLuttwitz / Reform§!: [?GER_freikorps_reform|0]\n§CKapp / Army Tradition§!: [?GER_freikorps_tradition|0]\n\nThe dot in the triangle changes position after the Freikorps values refresh."
