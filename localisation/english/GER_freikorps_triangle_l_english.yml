 GER_freikorps_back_tradition:0 "Back Kapp's Tradition Bloc"
 GER_freikorps_back_tradition_desc:0 "Move the organisation toward §YTradition§!: Prussian hierarchy, aristocratic officers, and Fundamentalist restoration.\n\nEffects: §G+10§! Tradition, §R-4§! Reform, §R-6§! Radicalism. Also shifts public popularity toward §YFundamentalist Absolutism§!."
 GER_freikorps_back_reform:0 "Back Luttwitz's Reform Bloc"
 GER_freikorps_back_reform_desc:0 "Move the organisation toward §YReform§!: liberal-military administration, practical modernization, and controlled institutional repair.\n\nEffects: §G+10§! Reform, §R-4§! Tradition, §R-6§! Radicalism. Also shifts public popularity toward §YLiberalism§!."
 GER_freikorps_back_radicalism:0 "Back Strasser's Radical Bloc"
 GER_freikorps_back_radicalism_desc:0 "Move the organisation toward §YRadicalism§!: worker nationalism, revolutionary veterans, mass mobilisation, and anti-old-order violence.\n\nEffects: §G+10§! Radicalism, §R-4§! Reform, §R-6§! Tradition. Also shifts public popularity toward §YWorker Nationalism§!."
 GER_summon_freikorps_convention:0 "Summon the Freikorps Convention"
 GER_summon_freikorps_convention_desc:0 "One wing has reached §Y80+§! support. The organisation may now be forced into a binding convention. A pure victory gives stronger buffs but harsher abandonment effects. Appeasing a rival faction softens the penalties while weakening the final bonuses."
 GER_freikorps.100.t:0 "The Freikorps Convention"
 GER_freikorps.100.d:0 "The halls are full of uniforms, veterans, ideologues, and exhausted officers. The organisation can no longer pretend to be a single movement. Kapp's Fundamentalists demand restoration and hierarchy. Luttwitz's Liberals demand a disciplined reforming directorate. Strasser's Worker Nationalists demand rebirth through mobilisation and social revolution. The dominant faction can seize the organisation outright, or it can appease one of its rivals to avoid total rupture."
 GER_freikorps.100.a:0 "Kapp leads alone: restore the old order."
 GER_freikorps.100.b:0 "Kapp leads, but appease Luttwitz's Liberals."
 GER_freikorps.100.c:0 "Kapp leads, but appease Strasser's Worker Nationalists."
 GER_freikorps.100.e:0 "Luttwitz leads alone: build the Liberal Directorate."
 GER_freikorps.100.f:0 "Luttwitz leads, but appease Kapp's Fundamentalists."
 GER_freikorps.100.g:0 "Luttwitz leads, but appease Strasser's Worker Nationalists."
 GER_freikorps.100.i:0 "Strasser leads alone: proclaim Worker Nationalist rebirth."
 GER_freikorps.100.j:0 "Strasser leads, but appease Luttwitz's Liberals."
 GER_freikorps.100.k:0 "Strasser leads, but appease Kapp's Fundamentalists."
 GER_freikorps_unsettled_organisation:0 "Unsettled Freikorps Organisation"
 GER_freikorps_unsettled_organisation_desc:0 "The Freikorps are powerful, but not unified. Tradition, Reform, and Radicalism all claim to represent Germany's salvation."
 GER_germany_divided:0 "Germany Divided!"
 GER_germany_divided_desc:0 "Germany is broken into rival claimants, but the wound has also hardened the soldiers still under Berlin's command."
 GER_stabbed_in_the_back:0 "Stabbed in the Back!"
 GER_stabbed_in_the_back_desc:0 "Defeat, betrayal, shortages, and political paralysis have left the state barely able to govern itself."
 GER_stabbed_in_the_back_political_scars:0 "Stabbed in the Back!"
 GER_stabbed_in_the_back_political_scars_desc:0 "Germany's economy is no longer strangled by the collapse, but the political myth of betrayal still poisons the republic."
 GER_prussian_legacy:0 "Prussian Legacy"
 GER_prussian_legacy_desc:0 "The old officer culture still survives in the barracks, drill grounds, and command tables of the Freikorps."
 GER_split_in_twane:0 "Split in Twane"
 GER_split_in_twane_desc:0 "The country is split between hostile German authorities, making coherent army organisation painfully difficult."
 GER_unstable_triumvirate:0 "Unstable Triumvirate"
 GER_unstable_triumvirate_desc:0 "Strasser, Luttwitz, and Kapp are locked inside the same state apparatus. The triangle decides which faction finally breaks the deadlock."
 GER_wilhelm_dynasty_restored:0 "Wilhelm Dynasty Restored"
 GER_wilhelm_dynasty_restored_desc:0 "The restored dynasty offers Germany a legitimist center of gravity: conservative enough to calm the officer corps, constitutional enough to satisfy the liberal order."
 GER_prussian_restoration:0 "Prussian Restoration"
 GER_prussian_restoration_desc:0 "Kapp's Fundamentalist camp has imposed aristocratic-military discipline over the organisation."
 GER_liberal_directorate:0 "Liberal Directorate"
 GER_liberal_directorate_desc:0 "Luttwitz's Liberal camp has turned the Freikorps into a disciplined emergency reform state."
 GER_worker_nationalist_rebirth:0 "Worker Nationalist Rebirth"
 GER_worker_nationalist_rebirth_desc:0 "Strasser's Worker Nationalists have seized the organisation and turned it toward mass mobilisation and social-national revolution."
 GER_conservative_liberal_compromise:0 "Conservative-Liberal Compromise"
 GER_conservative_liberal_compromise_desc:0 "The victorious camp has preserved enough of the old hierarchy while conceding room to institutional reform."
 GER_national_popular_officer_state:0 "National-Popular Officer State"
 GER_national_popular_officer_state_desc:0 "The officer corps and radical street politics have been forced into an unstable but potent synthesis."
 GER_liberal_worker_compromise:0 "Liberal-Worker Compromise"
 GER_liberal_worker_compromise_desc:0 "Reformist administration and worker-national mobilisation have been blended into a less pure but more survivable settlement."
 GER_freikorps_initialize_system:0 "Initialize Freikorps Triangle"
 GER_freikorps_initialize_system_desc:0 "Fallback initializer. This should only appear if the startup hook did not initialize the Freikorps triangle automatically."
 GER_freikorps_test_push_to_convention:0 "DEBUG: Push Luttwitz to Convention"
 GER_freikorps_test_push_to_convention_desc:0 "Debug-only test decision. Enable with the country flag GER_freikorps_debug_enabled."
