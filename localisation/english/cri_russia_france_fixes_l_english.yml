l_english:
 EE_no_clear_goal:0 "No Clear Goal"
 EE_no_clear_goal_desc:0 "The White movement knows what it opposes, but not what Russia should become after victory."
 EE_disunited_resistance:0 "Disunited Resistance"
 EE_disunited_resistance_desc:0 "Officers, monarchists, liberals, regionalists, and local commanders pull against each other even while fighting the same enemy."
 EE_fire_of_russia_white:0 "The Fire of Russia"
 EE_fire_of_russia_white_desc:0 "The burning of the Romanovs has become a wound and a rallying cry for the anti-Bolshevik cause."
 EE_great_marxist_schism:0 "The Great Marxist Schism"
 EE_great_marxist_schism_desc:0 "Mensheviks, Bolsheviks, council socialists, and hardliners are locked in a struggle over the revolution itself."
 EE_fire_of_russia_red:0 "The Fire of Russia"
 EE_fire_of_russia_red_desc:0 "The death of the Romanovs has become proof that the old order can be burned away forever."
 EE_dekulakisation:0 "Dekulakisation"
 EE_dekulakisation_desc:0 "Class war in the countryside is tearing food supply, local administration, and social order apart."
