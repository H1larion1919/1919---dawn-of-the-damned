l_english:
 EE_GER_BLACK_LEGION:0 "Die Schwarze Legion"
 ee_ger_conquest.1.a:0 "Done"
 ee_ger_conquest.2.t:0 "The Lithuanian Settlement"
 ee_ger_conquest.2.d:0 "Lithuania is collapsing under the German advance. Memel will be annexed; the question is whether Lithuania is rebuilt as a Baltic-wide federated state or left as a narrower Lithuanian republic under German power."
 ee_ger_conquest.2.a:0 "Create Volksrepublik Baltikum."
 ee_ger_conquest.2.b:0 "Create Volksrepublik Litauen."
 ee_ger_conquest.3.t:0 "Volksrepublik Deutschland"
 ee_ger_conquest.3.d:0 "The Rhine has fallen, the German workers' banners are raised across the old imperial heartland, and Strasser's revolution stands ready to proclaim a new national workers' state."
 ee_ger_conquest.3.a:0 "Auf ewig vereint, Nation und Arbeiter"
 ee_ger_conquest.19.t:0 "Order Restored to Germany"
 ee_ger_conquest.19.d:0 "The central German state has been brought back under liberal authority. The old emergency is not forgotten, but the republic can finally claim that order has returned."
 ee_ger_conquest.19.a:0 "Germany breathes again."
 ee_ger_conquest.20.t:0 "Order Restored to Germany"
 ee_ger_conquest.20.d:0 "Berlin announces the restoration of order under the Kingdom of Germany. Liberal governments present the moment as constitutional rescue; leftist movements mourn crushed proletarians in Germany, while the right celebrates the return of dynasty, discipline, and a familiar state."
 ee_ger_conquest.20.a:0 "Germany has chosen the crown."
 ee_ger_conquest.21.t:0 "Germany Is an Army With a State"
 ee_ger_conquest.21.d:0 "Germany has been reorganized into the German Despotate. Even conservative observers are uneasy: the army no longer serves the state so much as possesses it, and the new order makes no apology for rule by command."
 ee_ger_conquest.21.a:0 "A hard thing has taken shape."
 ee_ger_conquest.22.t:0 "From the Ashes Rose a New Flame"
 ee_ger_conquest.22.d:0 "The German revolution has remade itself from ruins into the Volksrepublik Deutschland. Left-wing parties are divided between fear and fascination, the right studies the new regime with wary interest, and neutral governments recoil from a fire they cannot easily name."
 ee_ger_conquest.22.a:0 "Germany burns differently now."
 ee_ger_conquest.23.t:0 "Germany Is an Army With a State"
 ee_ger_conquest.23.d:0 "The Prussian inheritance has swallowed the republic. Germany now moves as a military state first and a civil state second."
 ee_ger_conquest.23.a:0 "The barracks have won."
 GER_zussammen:0 "Zussammen"
 GER_zussammen_desc:0 "Nation and worker have been bound into one revolutionary state. The new order moves with terrifying confidence, industry, discipline, and political will."
 GER_picking_back_up_the_pieces:0 "Picking Back Up the Pieces"
 GER_post_auf_decisions:0 "Picking Back Up the Pieces"
 GER_establish_volkrepublik_westdeutschland:0 "Establish the Volkrepublik Westdeutschland"
 GER_establish_volkrepublik_westdeutschland_desc:0 "The low countries can be reorganized into a loyal western federated state."
 GER_negotiations_over_hannover:0 "Picking Back Up the Pieces"
 GER_invite_the_saxons_for_a_talk:0 "Invite the Saxons for a Talk"
 GER_discuss_privileges:0 "Discuss Privileges"
 GER_offer_market_guarantees:0 "Offer Market Guarantees"
 GER_formalize_compensation:0 "Formalize Compensation"
 GER_buy_hannover_back:0 "Buy Hannover Back"
 GER_intimidate_lithuania_over_memel:0 "Intimidate Lithuania over Memel"
 GER_intimidate_lithuania_over_memel_desc:0 "Pressure Lithuania into handing over Memel before the new German state has to take it by force."
 GER_intimidate_denmark_over_the_belt:0 "Intimidate Denmark over the Belt"
 GER_intimidate_denmark_over_the_belt_desc:0 "Demand control of the Belt. Denmark's willingness to fold depends on how hopeless the military balance looks."
 GER_prepare_warplans_for_alr:0 "Prepare Warplans for Lothoringia"
 GER_prepare_warplans_for_alr_desc:0 "Draft the operational plans needed to crush the Lothoringian revolt."
 ee_ger_hannover.4.t:0 "Negotiations Over Hannover"
 ee_ger_hannover.4.d:0 "The German delegation has requested talks over Hannover, arguing that the region belongs within the new Volkrepublik."
 ee_ger_hannover.4.a:0 "Sympathise with their cause."
 ee_ger_hannover.4.b:0 "Play hard to get."
 ee_ger_hannover.5.t:0 "To the North Sea"
 ee_ger_hannover.5.d:0 "The Saxons have accepted the German claim. The road to the North Sea opens."
 ee_ger_hannover.5.a:0 "A generous settlement."
 ee_ger_hannover.6.t:0 "Propose an Offer"
 ee_ger_hannover.6.d:0 "The first approach failed. If Hannover is to return, the Saxons must be given a reason to sign."
 ee_ger_hannover.6.a:0 "Prepare a better proposal."
 ee_ger_hannover.7.t:0 "What Are Our Demands?"
 ee_ger_hannover.7.d:0 "Germany is back at the table. Hannover can be exchanged for influence, markets, or stubborn refusal."
 ee_ger_hannover.7.a:0 "Military and port access."
 ee_ger_hannover.7.b:0 "Markets and compensation."
 ee_ger_hannover.7.c:0 "The land remains ours."
 ee_ger_hannover.8.t:0 "The Access Demand"
 ee_ger_hannover.8.d:0 "England will return Hannover in exchange for indefinite military and port access."
 ee_ger_hannover.8.a:0 "Accept the access terms."
 ee_ger_hannover.8.b:0 "No. Keep trying."
 ee_ger_hannover.9.t:0 "The Market Demand"
 ee_ger_hannover.9.d:0 "England will return Hannover in exchange for compensation and privileged economic access."
 ee_ger_hannover.9.a:0 "Accept the market terms."
 ee_ger_hannover.9.b:0 "No. Keep trying."
 ee_ger_hannover.10.t:0 "The Land Demand"
 ee_ger_hannover.10.d:0 "England refuses to discuss transfer. Only a larger package can move the talks now."
 ee_ger_hannover.10.a:0 "Then we escalate the offer."
 ee_ger_hannover.11.t:0 "Markets on the Table"
 ee_ger_hannover.11.d:0 "The offer has expanded to include commercial guarantees and managed access to German markets."
 ee_ger_hannover.11.a:0 "Continue the talks."
 ee_ger_hannover.12.t:0 "The Compensation Formula"
 ee_ger_hannover.12.d:0 "A formula is taking shape: political payment, industrial concessions, and the return of Hannover."
 ee_ger_hannover.12.a:0 "Draft the final purchase."
 ee_ger_hannover.13.t:0 "Hannover Purchased"
 ee_ger_hannover.13.d:0 "The agreement is signed. Hannover returns to Germany, and England receives the promised compensation."
 ee_ger_hannover.13.a:0 "Hannover is ours."
 ee_ger_pieces.14.t:0 "The Memel Demand"
 ee_ger_pieces.14.d:0 "The German revolution has demanded Memel. The message leaves little room for interpretation: hand over the state or prepare for war."
 ee_ger_pieces.14.a:0 "Hand over Memel."
 ee_ger_pieces.14.b:0 "Fight for it."
 ee_ger_pieces.15.t:0 "Memel Returned"
 ee_ger_pieces.15.d:0 "Lithuania has accepted the demand. Memel has returned without a shot fired."
 ee_ger_pieces.15.a:0 "A sensible answer."
 ee_ger_pieces.16.t:0 "The Belt Demand"
 ee_ger_pieces.16.d:0 "The German revolution has demanded the Belt. Refusal means war, but surrendering it would place a German hand on Denmark's throat."
 ee_ger_pieces.16.a:0 "Hand over the Belt."
 ee_ger_pieces.16.b:0 "Fight for it."
 ee_ger_pieces.17.t:0 "The Belt Secured"
 ee_ger_pieces.17.d:0 "Denmark has folded under pressure. The Belt is now in German hands."
 ee_ger_pieces.17.a:0 "Good."
