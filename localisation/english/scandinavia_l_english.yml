 ee_scandinavia.10.b:0 "Workers of the WORLD unite!"
 ee_scandinavia.10.d:0 "The northern occupation zone has collapsed. Norway must now decide whether the revolution ends at the old national frontier or crosses into a broader northern settlement."
 ee_scandinavia.10.t:0 "The Sapmi Question"
 ee_scandinavia.20.a:0 "Forty days remain."
 ee_scandinavia.20.d:0 "With Oslo slipping out of Danish hands, the North Atlantic Occupation Zone is preparing to intervene in the north."
 ee_scandinavia.20.t:0 "Northern intervention imminent"
 ee_scandinavia.21.a:0 "The north ignites."
 ee_scandinavia.31.a:0 "Send the army."
 ee_scandinavia.31.d:0 "Danish authorities have uncovered another shipment of weapons bound for the occupied Norwegian coast. Local commanders demand troops immediately."
 ee_scandinavia.31.t:0 "Norwegian arms discovered"
 ee_scandinavia.40.a:0 "For the workers of Norway."
 ee_scandinavia.40.d:0 "The armed cells across occupied Norway have risen together. The war for the coast has begun."
 ee_scandinavia.40.t:0 "Norwegian Worker's Revolution"
