l_english:
 EE_arm_our_brothers:0 "Arm our brothers"
 EE_arm_our_brothers_desc:0 "Weapons, messengers, and party cadres move through the occupied coast while Denmark still holds Oslo."
 EE_atlantic_vikings:0 "Atlantic Vikings"
 EE_atlantic_vikings_desc:0 "Danish control over coastal Norway has strengthened the absolutist sea bloc while feeding resistance across the occupied coast."
 EE_en_proevelse_for_venskab:0 "En prøvelse for venskab"
 EE_en_proevelse_for_venskab_desc:0 "Denmark cannot freely enter a faction while the Norwegian struggle remains unresolved."
 EE_frihetskamp:0 "Frihetskamp"
 EE_frihetskamp_desc:0 "The Revolutionary Nordic People's Front is sustained by a broad liberation struggle against occupation."
 EE_noisy_neighbours:0 "Noisy Neighbours!"
 EE_noisy_neighbours_desc:0 "The conflict in Norway has made Swedish diplomacy brittle and unpopular."
 EE_nor_resistance_cooldown:0 "Preparing the next arms shipment"
 EE_nor_resistance_cooldown_desc:0 ""
 EE_northern_intervention_imminent:0 "Northern intervention imminent"
 EE_northern_intervention_imminent_desc:0 ""
 ee_norway_sapmi:0 "The Sapmi Question"
 ee_norwegian_resistance:0 "Arm Our Brothers"
 EE_norwegian_resistance_smuggling:0 "Norwegian resistance smuggling"
 EE_reverse_danelaw:0 "The Reverse Danelaw"
 EE_reverse_danelaw_desc:0 "The northern occupation zone exists under Danish cover and British pressure, frozen in place while Oslo remains occupied."
 ee_sapmi_question:0 "The Sapmi question"
 EE_sapmi_resistance:0 "Sapmi resistance"
 EE_sapmi_resistance_desc:0 "The northern question has not been settled; it has merely been pushed beneath the snow."
 EE_sapmi_war_of_independence:0 "Sapmi war of indipendence"
 EE_sapmi_war_of_independence_desc:0 "With Oslo no longer under Danish control, the northern occupation zone has been forced into a war for its own survival."
 ee_scandinavia.1.a:0 "OK"
