l_english:
 dd_ministers:0 "Appoint Your Ministers"
 government:0 "Laws & Government"
 dd_governance:0 "Governance"
 dd_governance_desc:0 "The state's structure of authority and political control."
 dd_law:0 "Law"
 dd_law_desc:0 "The strength, predictability, and reach of legal institutions."
 dd_society:0 "Society"
 dd_society_desc:0 "The social order, its hierarchies, and its level of emancipation."
 dd_economy:0 "Economy"
 dd_economy_desc:0 "The balance between state direction, organised interests, and private markets."
 dd_popularity:0 "Popularity"
 dd_popularity_desc:0 "The regime's public legitimacy and the population's willingness to cooperate."
 dd_militarism:0 "Militarism"
 dd_militarism_desc:0 "The degree to which military priorities shape politics, production, and public life."

 dd_governance_anarchy:0 "Anarchy"
 dd_governance_anarchy_desc:0 "Authority has broken down. Local actors improvise, administration stalls, and the state struggles to mobilise anything reliably."
 dd_governance_libertarianism:0 "Libertarianism"
 dd_governance_libertarianism_desc:0 "Power is pushed downward. Innovation and civic initiative rise, but discipline and wartime mobilisation suffer."
 dd_governance_decentralised:0 "Decentralised"
 dd_governance_decentralised_desc:0 "Regional government carries much of the state. It is stable locally, but slower when national mobilisation is needed."
 dd_governance_representativism:0 "Representativism"
 dd_governance_representativism_desc:0 "Representative institutions give the state legitimacy, steady administration, and room for reform."
 dd_governance_authoritarianism:0 "Authoritarianism"
 dd_governance_authoritarianism_desc:0 "Central authority can mobilise quickly, though research, debate, and political flexibility are constrained."
 dd_governance_oligarchy:0 "Oligarchy"
 dd_governance_oligarchy_desc:0 "A narrow elite can coordinate industry and order, but innovation and public legitimacy suffer."
 dd_governance_totalitarianism:0 "Totalitarianism"
 dd_governance_totalitarianism_desc:0 "The state reaches into every institution. War mobilisation is fierce, but society pays for it in fear, rigidity, and waste."

 dd_law_lawless_society:0 "Lawless Society"
 dd_law_lawless_society_desc:0 "Courts, police, and contracts barely function. Corruption, violence, and arbitrary rule poison the economy."
 dd_law_high_corruption:0 "High Corruption"
 dd_law_high_corruption_desc:0 "Public authority is widely bought and sold. The state still functions, but only after everyone takes their share."
 dd_law_heresay_laws:0 "Heresay Laws"
 dd_law_heresay_laws_desc:0 "Law exists, but procedure is weak and accusation often matters more than proof."
 dd_law_low_corruption:0 "Low Corruption"
 dd_law_low_corruption_desc:0 "Institutions are imperfect, but bribery and arbitrary decisions are no longer the normal route through government."
 dd_law_oral_traditions:0 "Oral Traditions"
 dd_law_oral_traditions_desc:0 "Custom and memory hold communities together, though modern bureaucracy and legal innovation remain limited."
 dd_law_strong_norms:0 "Strong Norms"
 dd_law_strong_norms_desc:0 "Shared expectations make public life predictable, even where written law remains incomplete."
 dd_law_constitutionalism:0 "Constitutionalism"
 dd_law_constitutionalism_desc:0 "Power is restrained by written law, regular procedure, and accepted limits on government."
 dd_law_rule_of_law:0 "Rule of Law"
 dd_law_rule_of_law_desc:0 "The law is stable, public, and broadly enforced. Institutions are trusted because even rulers must answer to them."

 dd_society_absolute_equality:0 "Absolute Equality"
 dd_society_absolute_equality_desc:0 "Hierarchy is treated as a social disease. Education, production, and research benefit, while mobilisation and cohesion suffer."
 dd_society_general_emancipation:0 "General Emancipation"
 dd_society_general_emancipation_desc:0 "Formal restrictions are rolled back. Talent moves more freely, but old institutions lose some of their grip."
 dd_society_traditionalism:0 "Traditionalism"
 dd_society_traditionalism_desc:0 "Society is organised around inherited customs. Stability is strong, but progress moves cautiously."
 dd_society_mobile_hierarchy:0 "Mobile Hierarchy"
 dd_society_mobile_hierarchy_desc:0 "Hierarchy remains, but capable people can rise. The state gains discipline without fully freezing society."
 dd_society_strict_hierarchy:0 "Strict Hierarchy"
 dd_society_strict_hierarchy_desc:0 "Rank, duty, and obedience define public life. Mobilisation is easier, but creativity and industrial adaptation suffer."

 dd_economy_communism:0 "Communism"
 dd_economy_communism_desc:0 "The state directs production and distribution. Military output can be forced upward, but quality and research lag."
 dd_economy_socialism:0 "Socialism"
 dd_economy_socialism_desc:0 "Large parts of the economy are planned or publicly controlled, trading efficiency and innovation for direct mobilisation."
 dd_economy_syndicalism:0 "Syndicalism"
 dd_economy_syndicalism_desc:0 "Unions and producer organisations coordinate the economy. Shop-floor control helps output, but research can become uneven."
 dd_economy_distributism:0 "Distributism"
 dd_economy_distributism_desc:0 "Smallholders, cooperatives, and local ownership keep society stable while industry grows at a moderate pace."
 dd_economy_corporatism:0 "Corporatism"
 dd_economy_corporatism_desc:0 "Industry, labour, and the state are bound into managed blocs. Output improves, but independent research narrows."
 dd_economy_state_capitalism:0 "State Capitalism"
 dd_economy_state_capitalism_desc:0 "The state owns the commanding heights while markets handle the rest. Construction and output rise under close direction."
 dd_economy_free_markets:0 "Free Markets"
 dd_economy_free_markets_desc:0 "Private capital moves quickly. Construction and research accelerate, though consumer demands and instability rise."
 dd_economy_lassais_fairez:0 "Lassais Fairez"
 dd_economy_lassais_fairez_desc:0 "The market runs ahead of the state. Growth and research are fast, but public direction is weak and civilian demand expands."

 dd_popularity_none:0 "No Popularity"
 dd_popularity_none_desc:0 "The regime is despised or ignored. Morale, organisation, construction, and political control all suffer."
 dd_popularity_low:0 "Low Popularity"
 dd_popularity_low_desc:0 "The public mood is sour. The state can still function, but only with friction."
 dd_popularity_medium:0 "Medium Popularity"
 dd_popularity_medium_desc:0 "Public support is mixed, giving the government a modest base to work from."
 dd_popularity_high:0 "High Popularity"
 dd_popularity_high_desc:0 "The regime is broadly trusted. Construction, morale, organisation, and political work all benefit."
 dd_popularity_absolute:0 "Absolute Popularity"
 dd_popularity_absolute_desc:0 "The country rallies around the government. Institutions move quickly and the army draws confidence from public support."

 dd_militarism_demilitarised_society:0 "Demilitarised Society"
 dd_militarism_demilitarised_society_desc:0 "The army is kept deliberately small. Civilian life is calmer, but the state is poorly prepared for war."
 dd_militarism_civil_guard:0 "Civil Guard"
 dd_militarism_civil_guard_desc:0 "A limited military culture exists without dominating public life."
 dd_militarism_military_readiness:0 "Military Readiness"
 dd_militarism_military_readiness_desc:0 "The state keeps a serious reserve of trained officers, factories, and plans."
 dd_militarism_militarised_state:0 "Militarised State"
 dd_militarism_militarised_state_desc:0 "Military priorities shape industry and politics. The army improves while civilian society becomes strained."
 dd_militarism_war_society:0 "War Society"
 dd_militarism_war_society_desc:0 "The country is organised around military necessity. Production and discipline rise sharply at a civilian cost."
 dd_militarism_total_militarisation:0 "Total Militarisation"
 dd_militarism_total_militarisation_desc:0 "Everything bends toward war. The army and arms industry surge, while stability and civilian industry pay the price."

 dd_militarism_public_backlash:0 "Militarist Backlash"
 dd_militarism_public_backlash_desc:0 "A heavily militarised state is alienating the public."
 dd_militarism_mass_politics_bonus:0 "Militarised Mass Politics"
 dd_militarism_mass_politics_bonus_desc:0 "The ruling movement turns militarisation into a source of public fervour."

 DD_government_laws_auto_assigned_tt:0 "These laws are assigned by ideology, events, and focus effects. They are not meant to be manually selected by the player."
