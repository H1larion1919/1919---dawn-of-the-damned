l_english:
 autonomy_ee_protectorate:0 "Protectorate"
 autonomy_ee_protectorate_desc:0 "A protectorate maintains broad internal and diplomatic freedom under mutual guarantees of independence and military access with its patron."
 autonomy_ee_dependency:0 "Dependency"
 autonomy_ee_dependency_desc:0 "A dependency retains domestic freedom, but its trade and external posture are constrained by the interests of its overlord."
 autonomy_ee_colony:0 "Colony"
 autonomy_ee_colony_desc:0 "A colony cannot independently pursue foreign relations, is tied to the overlord's bloc, and can be heavily exploited for construction, resources, and manpower."
 autonomy_ee_autonomous_region:0 "Autonomous Region"
 autonomy_ee_autonomous_region_desc:0 "An autonomous region is expected to align ideologically with its overlord and can be subjected to broad economic and military measures."
 autonomy_ee_federated_state:0 "Federated State"
 autonomy_ee_federated_state_desc:0 "A federated state is deeply integrated with its overlord, sharing its color and allowing direct overlord influence over its administration."

